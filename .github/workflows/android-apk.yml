name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      CAPACITOR_SERVER_URL: ${{ vars.CAPACITOR_SERVER_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify remote app URL is configured
        run: |
          if [ -z "$CAPACITOR_SERVER_URL" ]; then
            echo "CAPACITOR_SERVER_URL is not set."
            echo "Add it in GitHub: Settings > Secrets and variables > Actions > Variables."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor Android project
        run: npm run cap:sync

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: liftlog-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
