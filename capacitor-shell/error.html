<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LiftLog Offline</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <img class="shell__logo shell__logo--small" src="./liftlogo-dark.jpg" alt="LiftLog" />
      <section class="shell__card">
        <p class="shell__eyebrow">Connection issue</p>
        <h1>LiftLog could not reach the deployed app.</h1>
        <p>
          Check your internet connection and confirm the configured
          <code>CAPACITOR_SERVER_URL</code> is correct.
        </p>
      </section>
    </main>
  </body>
</html>
